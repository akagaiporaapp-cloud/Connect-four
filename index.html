<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four Multiplayer - Firebase</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
        }

        #player-role {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            background-color: #ddd;
        }

        .role-red { background-color: #ff4136 !important; color: white; }
        .role-yellow { background-color: #ffdc00 !important; color: #333; }
        .role-spectator { background-color: #7f8c8d !important; color: white; }

        #status {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #555;
        }

        #board {
            background-color: #0066cc;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: repeat(7, 60px);
            grid-gap: 10px;
            cursor: pointer;
        }

        .cell {
            width: 60px;
            height: 60px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s ease;
        }

        .cell.red { background-color: #ff4136; }
        .cell.yellow { background-color: #ffdc00; }

        #reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #reset-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <h1>Connect Four</h1>
    <div id="player-role">Identificando jogador...</div>
    <div id="status">Conectando ao Firebase...</div>
    <div id="board"></div>
    <button id="reset-btn">Reiniciar Jogo</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Sua configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCC26_ayjIvJmPoneYzNmMj3OwCXRbc_-g",
            authDomain: "conect-four-2f029.firebaseapp.com",
            databaseURL: "https://conect-four-2f029-default-rtdb.firebaseio.com",
            projectId: "conect-four-2f029",
            storageBucket: "conect-four-2f029.firebasestorage.app",
            messagingSenderId: "5310677394",
            appId: "1:5310677394:web:4a81fcd9399bad1abd414b"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Referências do Banco
        const gameRef = ref(db, 'game_state');
        const playersRef = ref(db, 'players');

        const ROWS = 6;
        const COLS = 7;
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const roleElement = document.getElementById('player-role');
        const resetBtn = document.getElementById('reset-btn');

        // Variável local que identifica quem é esta aba instalada
        let myRole = ""; // "red", "yellow" ou "spectator"

        let gameState = {
            board: Array(ROWS).fill(null).map(() => Array(COLS).fill('')),
            turn: 'red',
            winner: ''
        };

        // Gera uma ID única aleatória para esta aba rastrear a sua sessão
        const myPlayerId = Math.random().toString(36).substring(2, 9);

        // 1. GERENCIAMENTO DE JOGADORES (CONEXÃO E VAGAS)
        onValue(playersRef, (snapshot) => {
            const players = snapshot.val() || {};
            
            // Se eu ainda não tenho função definida, vou tentar pegar uma vaga livre
            if (!myRole) {
                if (!players.player1) {
                    myRole = "red";
                    set(ref(db, 'players/player1'), myPlayerId);
                    onDisconnect(ref(db, 'players/player1')).remove(); // Remove se fechar a aba
                } else if (players.player1 === myPlayerId) {
                    myRole = "red";
                } else if (!players.player2) {
                    myRole = "yellow";
                    set(ref(db, 'players/player2'), myPlayerId);
                    onDisconnect(ref(db, 'players/player2')).remove(); // Remove se fechar a aba
                } else if (players.player2 === myPlayerId) {
                    myRole = "yellow";
                } else {
                    myRole = "spectator";
                }
            }

            // Atualiza a interface informando quem você é no jogo
            roleElement.className = "";
            if (myRole === "red") {
                roleElement.innerText = "Você é o Jogador: VERMELHO";
                roleElement.classList.add("role-red");
            } else if (myRole === "yellow") {
                roleElement.innerText = "Você é o Jogador: AMARELO";
                roleElement.classList.add("role-yellow");
            } else {
                roleElement.innerText = "Você é um: ESPECTADOR (Sala Cheia)";
                roleElement.classList.add("role-spectator");
            }
        });


        // 2. LOGICA DO TABULEIRO DO JOGO
        function createBoardDOM() {
            boardElement.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleMove(c));
                    boardElement.appendChild(cell);
                }
            }
        }

        function updateUI() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.querySelector(`[data-row='${r}'][data-col='${c}']`);
                    cell.className = 'cell';
                    if (gameState.board[r][c] === 'red') cell.classList.add('red');
                    if (gameState.board[r][c] === 'yellow') cell.classList.add('yellow');
                }
            }

            if (gameState.winner) {
                if (gameState.winner === 'draw') {
                    statusElement.innerText = "Empate!";
                } else {
                    statusElement.innerText = `Fim de Jogo! O jogador ${gameState.winner.toUpperCase()} venceu!`;
                }
            } else {
                // Informa o turno e avisa se é a sua vez de jogar
                const isMyTurn = gameState.turn === myRole;
                statusElement.innerText = `Turno do: ${gameState.turn.toUpperCase()} ${isMyTurn ? '(SUA VEZ!)' : '(Aguarde...)'}`;
            }
        }

        function handleMove(col) {
            // BLOQUEIOS CRÍTICOS:
            if (gameState.winner) return;                  // Jogo acabou
            if (myRole === 'spectator') return;            // Espectador não joga
            if (gameState.turn !== myRole) return;         // Não é o seu turno!

            let row = -1;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (gameState.board[r][col] === '') {
                    row = r;
                    break;
                }
            }

            if (row === -1) return; // Coluna cheia

            gameState.board[row][col] = gameState.turn;

            if (checkWinner(row, col)) {
                gameState.winner = gameState.turn;
            } else if (gameState.board.every(row => row.every(cell => cell !== ''))) {
                gameState.winner = 'draw';
            } else {
                gameState.turn = gameState.turn === 'red' ? 'yellow' : 'red';
            }

            set(gameRef, gameState);
        }

        function checkWinner(r, c) {
            const player = gameState.board[r][c];
            const directions = [
                [[0, 1], [0, -1]],  // Horizontal
                [[1, 0], [-1, 0]],  // Vertical
                [[1, 1], [-1, -1]], // Diagonal \
                [[1, -1], [-1, 1]]  // Diagonal /
            ];

            for (let [d1, d2] of directions) {
                let count = 1;
                let row = r + d1[0], col = c + d1[1];
                while (row >= 0 && row < ROWS && col >= 0 && col < COLS && gameState.board[row][col] === player) {
                    count++; row += d1[0]; col += d1[1];
                }
                row = r + d2[0]; col = c + d2[1];
                while (row >= 0 && row < ROWS && col >= 0 && col < COLS && gameState.board[row][col] === player) {
                    count++; row += d2[0]; col += d2[1];
                }
                if (count >= 4) return true;
            }
            return false;
        }

        // Ouve atualizações do jogo
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                gameState = data;
            } else {
                resetGame();
            }
            updateUI();
        });

        function resetGame() {
            // Apenas jogadores ativos podem resetar o jogo
            if(myRole === 'spectator') return;

            const initialValues = {
                board: Array(ROWS).fill(null).map(() => Array(COLS).fill('')),
                turn: 'red',
                winner: ''
            };
            set(gameRef, initialValues);
        }

        resetBtn.addEventListener('click', resetGame);
        createBoardDOM();
    </script>
</body>
</html>
