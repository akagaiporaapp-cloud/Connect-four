<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four Multiplayer - Firebase</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        #status {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #555;
        }

        #board {
            background-color: #0066cc;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: repeat(7, 60px);
            grid-gap: 10px;
            cursor: pointer;
        }

        .cell {
            width: 60px;
            height: 60px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s ease;
        }

        .cell.red { background-color: #ff4136; }
        .cell.yellow { background-color: #ffdc00; }

        #reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #reset-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <h1>Connect Four</h1>
    <div id="status">Conectando ao Firebase...</div>
    <div id="board"></div>
    <button id="reset-btn">Reiniciar Jogo</button>

    <!-- Usamos type="module" para permitir o uso de 'import' nativo no navegador -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // SDK adicional necessário para utilizar a Realtime Database
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCC26_ayjIvJmPoneYzNmMj3OwCXRbc_-g",
            authDomain: "conect-four-2f029.firebaseapp.com",
            databaseURL: "https://conect-four-2f029-default-rtdb.firebaseio.com",
            projectId: "conect-four-2f029",
            storageBucket: "conect-four-2f029.firebasestorage.app",
            messagingSenderId: "5310677394",
            appId: "1:5310677394:web:4a81fcd9399bad1abd414b"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        
        // Inicializa a Realtime Database do seu app
        const db = getDatabase(app);
        const gameRef = ref(db, 'game_state');

        // Configurações do Tabuleiro (6 linhas x 7 colunas)
        const ROWS = 6;
        const COLS = 7;
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const resetBtn = document.getElementById('reset-btn');

        // Objeto que controlará o estado do jogo localmente antes de sincronizar
        let gameState = {
            board: Array(ROWS).fill(null).map(() => Array(COLS).fill('')),
            turn: 'red', // 'red' ou 'yellow'
            winner: ''   // 'red', 'yellow', 'draw' ou ''
        };

        // Cria visualmente o tabuleiro na tela
        function createBoardDOM() {
            boardElement.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleMove(c));
                    boardElement.appendChild(cell);
                }
            }
        }

        // Atualiza o HTML e CSS sempre que houver mudança de dados no Firebase
        function updateUI() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.querySelector(`[data-row='${r}'][data-col='${c}']`);
                    cell.className = 'cell'; // Reseta classes antigas
                    if (gameState.board[r][c] === 'red') cell.classList.add('red');
                    if (gameState.board[r][c] === 'yellow') cell.classList.add('yellow');
                }
            }

            // Atualiza o texto do Status
            if (gameState.winner) {
                if (gameState.winner === 'draw') {
                    statusElement.innerText = "Empate de peões!";
                } else {
                    statusElement.innerText = `Vitória! O jogador ${gameState.winner.toUpperCase()} ganhou!`;
                }
            } else {
                statusElement.innerText = `Turno do jogador: ${gameState.turn.toUpperCase()}`;
            }
        }

        // Gerencia o clique em uma coluna do tabuleiro
        function handleMove(col) {
            if (gameState.winner) return; // Se o jogo já acabou, impede jogadas

            // Lógica física: Encontra a primeira linha vazia de baixo para cima
            let row = -1;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (gameState.board[r][col] === '') {
                    row = r;
                    break;
                }
            }

            // Se a coluna escolhida já estiver cheia, ignora o clique
            if (row === -1) return;

            // Insere a peça do jogador atual na matriz
            gameState.board[row][col] = gameState.turn;

            // Valida se esta jogada resultou em vitória ou empate
            if (checkWinner(row, col)) {
                gameState.winner = gameState.turn;
            } else if (gameState.board.every(row => row.every(cell => cell !== ''))) {
                gameState.winner = 'draw';
            } else {
                // Passa o turno para o próximo jogador
                gameState.turn = gameState.turn === 'red' ? 'yellow' : 'red';
            }

            // Envia o novo estado do jogo modificado para a sua Realtime Database
            set(gameRef, gameState);
        }

        // Função matemática para validar se existem 4 peças iguais conectadas em qualquer direção
        function checkWinner(r, c) {
            const player = gameState.board[r][c];
            const directions = [
                [[0, 1], [0, -1]],  // Horizontal (direita, esquerda)
                [[1, 0], [-1, 0]],  // Vertical (baixo, cima)
                [[1, 1], [-1, -1]], // Diagonal Principal (\)
                [[1, -1], [-1, 1]]  // Diagonal Secundária (/)
            ];

            for (let [d1, d2] of directions) {
                let count = 1;
                
                // Conta peças iguais na primeira direção
                let row = r + d1[0], col = c + d1[1];
                while (row >= 0 && row < ROWS && col >= 0 && col < COLS && gameState.board[row][col] === player) {
                    count++; row += d1[0]; col += d1[1];
                }
                
                // Conta peças iguais na direção oposta
                row = r + d2[0]; col = c + d2[1];
                while (row >= 0 && row < ROWS && col >= 0 && col < COLS && gameState.board[row][col] === player) {
                    count++; row += d2[0]; col += d2[1];
                }
                
                if (count >= 4) return true;
            }
            return false;
        }

        // Ouve atualizações em tempo real vindas do seu Firebase
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                gameState = data;
            } else {
                // Se a base de dados estiver vazia, inicia o estado limpo do jogo
                resetGame();
            }
            updateUI();
        });

        // Limpa o tabuleiro e reinicia os dados no Firebase
        function resetGame() {
            const initialValues = {
                board: Array(ROWS).fill(null).map(() => Array(COLS).fill('')),
                turn: 'red',
                winner: ''
            };
            set(gameRef, initialValues);
        }

        // Evento do botão de reiniciar jogo
        resetBtn.addEventListener('click', resetGame);

        // Executa a criação inicial dos elementos HTML do tabuleiro
        createBoardDOM();
    </script>
</body>
</html>
